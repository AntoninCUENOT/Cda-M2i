<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Maquettes AnimeTracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: -apple-system, sans-serif; padding: 40px 20px; }
    h1 { text-align: center; color: #1E1B4B; margin-bottom: 8px; font-size: 28px; }
    p  { text-align: center; color: #6B7280; margin-bottom: 40px; }
    .grid { display: flex; flex-wrap: wrap; gap: 32px; justify-content: center; }
    .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
    .card h3 { color: #1E1B4B; margin-top: 16px; font-size: 15px; }
    .card img { border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); width: 260px; }
  </style>
</head>
<body>
  <h1>Maquettes AnimeTracker</h1>
  <p>Aperçu des 5 écrans principaux — cliquer pour agrandir</p>
  <div class="grid">
    
    <div class="card">
      <a href="mockup-01-login.svg" target="_blank">
        <img src="mockup-01-login.svg" alt="Écran de connexion"/>
      </a>
      <h3>Écran de connexion</h3>
    </div>
    <div class="card">
      <a href="mockup-02-home.svg" target="_blank">
        <img src="mockup-02-home.svg" alt="Accueil"/>
      </a>
      <h3>Accueil</h3>
    </div>
    <div class="card">
      <a href="mockup-03-detail.svg" target="_blank">
        <img src="mockup-03-detail.svg" alt="Fiche animé"/>
      </a>
      <h3>Fiche animé</h3>
    </div>
    <div class="card">
      <a href="mockup-04-library.svg" target="_blank">
        <img src="mockup-04-library.svg" alt="Bibliothèque"/>
      </a>
      <h3>Bibliothèque</h3>
    </div>
    <div class="card">
      <a href="mockup-05-chat.svg" target="_blank">
        <img src="mockup-05-chat.svg" alt="Chat privé"/>
      </a>
      <h3>Chat privé</h3>
    </div>
  </div>
</body>
</html>
